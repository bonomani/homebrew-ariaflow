name: sync-formula

on:
  repository_dispatch:
    types:
      - sync-formula
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

jobs:
  sync-ariaflow-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Get latest ariaflow-server release
        id: release
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/bonomani/ariaflow-server/releases \
              | python3 -c "import sys,json; data=json.load(sys.stdin); r=[x for x in (data if isinstance(data,list) else []) if not x.get('draft',True) and x.get('tag_name')]; r.sort(key=lambda x: x['created_at'], reverse=True); print(r[0]['tag_name'])")
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check current formula version
        id: current
        run: |
          CURRENT=$(grep -oP '(?<=version ").*(?=")' Formula/ariaflow-server.rb || echo "none")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update formula if version changed
        if: steps.release.outputs.version != steps.current.outputs.version
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          URL="https://github.com/bonomani/ariaflow-server/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')

          cat > Formula/ariaflow-server.rb <<FORMULA
          class AriaflowServer < Formula
            desc "Sequential aria2 queue driver with adaptive bandwidth control"
            homepage "https://github.com/bonomani/ariaflow-server"
            url "${URL}"
            sha256 "${SHA256}"
            version "${VERSION}"
            license "MIT"
            depends_on "python"
            depends_on "aria2"
            head "https://github.com/bonomani/ariaflow-server.git", branch: "main"

            def install
              libexec.install "src"

              (bin/"ariaflow-server").write <<~EOS
                #!/bin/bash
                exec env PYTHONPATH="#{libexec}/src:\${PYTHONPATH}" python3 -m aria_queue "\$@"
              EOS
              chmod 0755, bin/"ariaflow-server"
            end

            service do
              run [opt_bin/"ariaflow-server", "serve", "--host", "127.0.0.1", "--port", "8000"]
              keep_alive true
              working_dir var
              log_path var/"log/ariaflow-server.log"
              error_log_path var/"log/ariaflow-server.err.log"
            end

            test do
              system bin/"ariaflow-server", "--help"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ariaflow-server.rb
          git commit -m "Update ariaflow-server formula to v${VERSION}"
          git push

  sync-ariaflow-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: sync-ariaflow-server

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get latest ariaflow-dashboard release
        id: release
        run: |
          TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/bonomani/ariaflow-dashboard/releases \
            | python3 -c "import sys,json; data=json.load(sys.stdin); r=[x for x in (data if isinstance(data,list) else []) if not x.get('draft',True) and x.get('tag_name')]; r.sort(key=lambda x: x['created_at'], reverse=True); print(r[0]['tag_name'])")
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check current formula version
        id: current
        run: |
          CURRENT=$(grep -oP '(?<=version ").*(?=")' Formula/ariaflow-dashboard.rb || echo "none")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update formula if version changed
        if: steps.release.outputs.version != steps.current.outputs.version
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          URL="https://github.com/bonomani/ariaflow-dashboard/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')

          cat > Formula/ariaflow-dashboard.rb <<FORMULA
          class AriaflowDashboard < Formula
            desc "Local dashboard frontend for ariaflow"
            homepage "https://github.com/bonomani/ariaflow-dashboard"
            url "${URL}"
            sha256 "${SHA256}"
            version "${VERSION}"
            license "MIT"
            depends_on "python"
            head "https://github.com/bonomani/ariaflow-dashboard.git", branch: "main"

            def install
              libexec.install "src"

              (bin/"ariaflow-dashboard").write <<~EOS
                #!/bin/bash
                exec env PYTHONPATH="#{libexec}/src:\${PYTHONPATH}" python3 -m ariaflow_web.cli "\$@"
              EOS
              chmod 0755, bin/"ariaflow-dashboard"
            end

            service do
              environment_variables ARIAFLOW_API_URL: "http://127.0.0.1:8000"
              run [opt_bin/"ariaflow-dashboard", "--host", "127.0.0.1", "--port", "8001"]
              keep_alive true
              working_dir var
              log_path var/"log/ariaflow-dashboard.log"
              error_log_path var/"log/ariaflow-dashboard.err.log"
            end

            def caveats
              <<~EOS
                ariaflow-dashboard can connect to a remote ariaflow-server instance via ARIAFLOW_API_URL.
                To run both locally:
                  brew install ariaflow
                  brew services start ariaflow-server
                  brew services start ariaflow-dashboard
              EOS
            end

            test do
              system bin/"ariaflow-dashboard", "--version"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ariaflow-dashboard.rb
          git commit -m "Update ariaflow-dashboard formula to v${VERSION}"
          git push
